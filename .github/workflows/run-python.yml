name: Run BAT Manually

on:
  workflow_dispatch:

jobs:
  run-bat:
    runs-on: windows-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt pip install -r requirements.txt
        shell: cmd

      - name: BAT 파일 실행
        run: cmd /c "발주확인_실행.bat"
